<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP-DOWN SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Canvas size
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// ─── Game State ───────────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3 };
let state = STATE.MENU;
let score = 0;
let highScore = 0;
let level = 1;

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = { up: false, down: false, left: false, right: false };
const mouse = { x: W / 2, y: H / 2, down: false };

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up    = true;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down  = true;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up    = false;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down  = false;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    mouse.down = true;
    if (state === STATE.MENU) startGame();
    else if (state === STATE.GAME_OVER) startGame();
    else if (state === STATE.PLAYING) playerShoot();
  }
});
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });

// ─── Entities ─────────────────────────────────────────────────────────────────
let player, bullets, enemies, particles, popups, muzzleFlashes;

// Screen shake
let shakeTimer = 0, shakeX = 0, shakeY = 0;
const SHAKE_DUR = 0.3;

// Level complete timer
let levelCompleteTimer = 0;
const LEVEL_COMPLETE_DUR = 3.0;

// Menu starfield
const stars = Array.from({ length: 120 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 20 + 5,
  alpha: Math.random()
}));

// Blinking text
let blinkTimer = 0;

// Shoot cooldown
let shootCooldown = 0;
const SHOOT_INTERVAL = 0.18;

// Walk animation
let walkFrame = 0;
let walkTimer = 0;

// Wave system
let waveEnemiesTotal = 0;
let waveEnemiesSpawned = 0;
let waveEnemiesKilled = 0;
let spawnTimer = 0;

function getLevelConfig(lvl) {
  const configs = [
    null,
    { total: 10, types: ['chaser'],                    interval: 2.0 },
    { total: 15, types: ['chaser','rusher'],            interval: 1.5 },
    { total: 20, types: ['chaser','rusher','tank'],     interval: 1.2 },
    { total: 25, types: ['chaser','rusher','tank'],     interval: 1.0 },
    { total: 30, types: ['chaser','rusher','tank'],     interval: 0.8 },
  ];
  if (lvl <= 5) return configs[lvl];
  return {
    total: 30 + (lvl - 5) * 5,
    types: ['chaser','rusher','tank'],
    interval: 0.7
  };
}

function startGame() {
  score = 0;
  level = 1;
  bullets = [];
  enemies = [];
  particles = [];
  popups = [];
  muzzleFlashes = [];
  shakeTimer = 0;
  shootCooldown = 0;
  walkFrame = 0;
  walkTimer = 0;

  player = {
    x: W / 2, y: H / 2,
    speed: 200,
    hp: 100, maxHp: 100,
    angle: 0,
    invTimer: 0,
    damageFlash: 0,
    alive: true
  };

  startLevel();
  state = STATE.PLAYING;
}

function startLevel() {
  bullets = [];
  enemies = [];
  spawnTimer = 0;
  waveEnemiesSpawned = 0;
  waveEnemiesKilled = 0;
  const cfg = getLevelConfig(level);
  waveEnemiesTotal = cfg.total;
}

// ─── Player Shoot ─────────────────────────────────────────────────────────────
function playerShoot() {
  if (shootCooldown > 0) return;
  shootCooldown = SHOOT_INTERVAL;

  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const gunLen = 20;
  const bx = player.x + Math.cos(angle) * gunLen;
  const by = player.y + Math.sin(angle) * gunLen;

  bullets.push({
    x: bx, y: by,
    vx: Math.cos(angle) * 500,
    vy: Math.sin(angle) * 500,
    r: 4,
    trail: []
  });

  muzzleFlashes.push({ x: bx, y: by, timer: 0.08 });
}

// ─── Spawn Enemy ──────────────────────────────────────────────────────────────
function spawnEnemy() {
  const cfg = getLevelConfig(level);
  const type = cfg.types[Math.floor(Math.random() * cfg.types.length)];
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  const off = 35;
  if (edge === 0) { x = Math.random() * W; y = -off; }
  else if (edge === 1) { x = W + off; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + off; }
  else { x = -off; y = Math.random() * H; }

  const defs = {
    chaser: { color: '#ff3030', hp: 1, maxHp: 1, speed: 120, dmg: 10, r: 14 },
    rusher: { color: '#ff8800', hp: 1, maxHp: 1, speed: 220, dmg: 15, r: 10 },
    tank:   { color: '#9b30ff', hp: 4, maxHp: 4, speed:  60, dmg: 25, r: 20 },
  };
  const d = defs[type];
  enemies.push({ x, y, type, ...d, angle: 0 });
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const speed = 60 + Math.random() * 120;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 3,
      color,
      life: 0.4,
      maxLife: 0.4
    });
  }
}

function spawnPopup(x, y, text) {
  popups.push({ x, y, text, life: 0.9, maxLife: 0.9, vy: -50 });
}

// ─── Update ───────────────────────────────────────────────────────────────────
let lastTime = 0;
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);
  draw();
}

function update(dt) {
  blinkTimer += dt;

  if (state === STATE.MENU) {
    for (const s of stars) {
      s.y += s.speed * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
    return;
  }

  if (state === STATE.LEVEL_COMPLETE) {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      level++;
      startLevel();
      state = STATE.PLAYING;
    }
    return;
  }

  if (state === STATE.GAME_OVER) return;

  // PLAYING
  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt);
  updateParticles(dt);
  updatePopups(dt);
  updateMuzzleFlashes(dt);
  updateSpawner(dt);
  checkWaveComplete();

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    shakeX = (Math.random() - 0.5) * 8;
    shakeY = (Math.random() - 0.5) * 8;
  } else {
    shakeX = 0; shakeY = 0;
  }

  // Shoot hold
  if (mouse.down && state === STATE.PLAYING) playerShoot();
  if (shootCooldown > 0) shootCooldown -= dt;
}

function updatePlayer(dt) {
  const p = player;
  let dx = 0, dy = 0;
  if (keys.left)  dx -= 1;
  if (keys.right) dx += 1;
  if (keys.up)    dy -= 1;
  if (keys.down)  dy += 1;

  const len = Math.sqrt(dx * dx + dy * dy);
  if (len > 0) { dx /= len; dy /= len; }

  p.x += dx * p.speed * dt;
  p.y += dy * p.speed * dt;
  p.x = Math.max(16, Math.min(W - 16, p.x));
  p.y = Math.max(16, Math.min(H - 16, p.y));

  p.angle = Math.atan2(mouse.y - p.y, mouse.x - p.x);

  if (len > 0) {
    walkTimer += dt;
    if (walkTimer > 0.1) { walkTimer = 0; walkFrame = (walkFrame + 1) % 8; }
  }

  if (p.invTimer > 0) p.invTimer -= dt;
  if (p.damageFlash > 0) p.damageFlash -= dt;
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.unshift({ x: b.x, y: b.y });
    if (b.trail.length > 3) b.trail.pop();

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1);
      continue;
    }

    // Hit enemy
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx * dx + dy * dy < (b.r + e.r) * (b.r + e.r)) {
        e.hp--;
        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, e.color);
          const pts = e.type === 'tank' ? 40 : e.type === 'rusher' ? 20 : 10;
          score += pts;
          spawnPopup(e.x, e.y, '+' + pts);
          waveEnemiesKilled++;
          enemies.splice(j, 1);
        }
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;
  }
}

function updateEnemies(dt) {
  const p = player;
  for (const e of enemies) {
    const dx = p.x - e.x, dy = p.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0) {
      e.x += (dx / dist) * e.speed * dt;
      e.y += (dy / dist) * e.speed * dt;
      e.angle = Math.atan2(dy, dx);
    }

    // Hit player
    if (p.invTimer <= 0 && dist < e.r + 16) {
      p.hp -= e.dmg;
      p.invTimer = 0.5;
      p.damageFlash = 0.2;
      shakeTimer = SHAKE_DUR;
      if (p.hp <= 0) {
        p.hp = 0;
        if (score > highScore) highScore = score;
        state = STATE.GAME_OVER;
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updatePopups(dt) {
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) popups.splice(i, 1);
  }
}

function updateMuzzleFlashes(dt) {
  for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
    muzzleFlashes[i].timer -= dt;
    if (muzzleFlashes[i].timer <= 0) muzzleFlashes.splice(i, 1);
  }
}

function updateSpawner(dt) {
  if (waveEnemiesSpawned >= waveEnemiesTotal) return;
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnEnemy();
    waveEnemiesSpawned++;
    const cfg = getLevelConfig(level);
    spawnTimer = cfg.interval;
  }
}

function checkWaveComplete() {
  if (waveEnemiesSpawned >= waveEnemiesTotal && enemies.length === 0) {
    state = STATE.LEVEL_COMPLETE;
    levelCompleteTimer = LEVEL_COMPLETE_DUR;
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state === STATE.MENU) { drawMenu(); return; }
  if (state === STATE.GAME_OVER) { drawGame(); drawGameOver(); return; }

  // Apply screen shake
  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawGame();
  ctx.restore();

  if (state === STATE.LEVEL_COMPLETE) drawLevelComplete();
  drawHUD();
}

function drawGame() {
  // Background
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bullets + trails
  for (const b of bullets) {
    for (let i = 0; i < b.trail.length; i++) {
      const t = b.trail[i];
      const alpha = (b.trail.length - i) / (b.trail.length + 1) * 0.5;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffee00';
      ctx.beginPath();
      ctx.arc(t.x, t.y, b.r * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffee00';
    ctx.shadowColor = '#ffee00';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Muzzle flashes
  for (const mf of muzzleFlashes) {
    const alpha = mf.timer / 0.08;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffee00';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(mf.x, mf.y, 10 * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Player
  if (player && player.alive) drawPlayer();

  // Score popups
  for (const p of popups) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffee00';
    ctx.font = 'bold 14px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Damage flash
  const isFlashing = p.damageFlash > 0 && Math.floor(p.damageFlash * 15) % 2 === 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(2, 4, 14, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (walk bob)
  const legOffset = Math.sin(walkFrame / 8 * Math.PI * 2) * 4;
  ctx.fillStyle = isFlashing ? '#ff4444' : '#444';
  // Left leg
  ctx.save();
  ctx.translate(-5, 8 + legOffset);
  ctx.fillRect(-3, 0, 5, 8);
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(5, 8 - legOffset);
  ctx.fillRect(-3, 0, 5, 8);
  ctx.restore();

  // Body
  ctx.fillStyle = isFlashing ? '#ff6666' : '#555';
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI * 2);
  ctx.fill();

  // Torso overlay
  ctx.fillStyle = isFlashing ? '#ff8888' : '#6a6a6a';
  ctx.beginPath();
  ctx.arc(0, -2, 10, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = isFlashing ? '#ff0000' : '#888';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI * 2);
  ctx.stroke();

  // Gun (rotates to mouse)
  ctx.rotate(p.angle);
  ctx.fillStyle = isFlashing ? '#ff4444' : '#333';
  ctx.fillRect(8, -3, 16, 6);
  ctx.fillStyle = isFlashing ? '#ff6666' : '#555';
  ctx.fillRect(10, -2, 12, 4);
  ctx.rotate(-p.angle);

  // Eyes (offset toward aim)
  const eyeOff = 5;
  const ex = Math.cos(p.angle) * eyeOff;
  const ey = Math.sin(p.angle) * eyeOff;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(ex - Math.sin(p.angle) * 4, ey + Math.cos(p.angle) * 4, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ex + Math.sin(p.angle) * 4, ey - Math.cos(p.angle) * 4, 3, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(ex - Math.sin(p.angle) * 4 + Math.cos(p.angle), ey + Math.cos(p.angle) * 4 + Math.sin(p.angle), 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ex + Math.sin(p.angle) * 4 + Math.cos(p.angle), ey - Math.cos(p.angle) * 4 + Math.sin(p.angle), 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // HP-based glow intensity
  const hpFrac = e.hp / e.maxHp;

  if (e.type === 'chaser') {
    // Diamond shape
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(0, -e.r);
    ctx.lineTo(e.r * 0.7, 0);
    ctx.lineTo(0, e.r);
    ctx.lineTo(-e.r * 0.7, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ff8080';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Inner detail
    ctx.fillStyle = '#ff6060';
    ctx.beginPath();
    ctx.moveTo(0, -e.r * 0.5);
    ctx.lineTo(e.r * 0.35, 0);
    ctx.lineTo(0, e.r * 0.5);
    ctx.lineTo(-e.r * 0.35, 0);
    ctx.closePath();
    ctx.fill();

  } else if (e.type === 'rusher') {
    // Triangle pointing toward player (e.angle)
    ctx.rotate(e.angle);
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(e.r, 0);
    ctx.lineTo(-e.r * 0.8, -e.r * 0.7);
    ctx.lineTo(-e.r * 0.8, e.r * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ffaa44';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Speed lines
    ctx.strokeStyle = 'rgba(255,136,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-e.r, -e.r * 0.3); ctx.lineTo(-e.r - 8, -e.r * 0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-e.r, e.r * 0.3);  ctx.lineTo(-e.r - 8, e.r * 0.3);  ctx.stroke();

  } else if (e.type === 'tank') {
    // Large square
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = e.color;
    ctx.fillRect(-e.r, -e.r, e.r * 2, e.r * 2);
    ctx.strokeStyle = '#cc88ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(-e.r, -e.r, e.r * 2, e.r * 2);
    ctx.shadowBlur = 0;
    // Inner square
    ctx.fillStyle = '#6a1fa0';
    const innerR = e.r * hpFrac * 0.55;
    ctx.fillRect(-innerR, -innerR, innerR * 2, innerR * 2);
    // HP pips
    for (let i = 0; i < e.maxHp; i++) {
      ctx.fillStyle = i < e.hp ? '#cc88ff' : '#333';
      ctx.fillRect(-e.r + 3 + i * 9, e.r - 8, 7, 4);
    }
  }

  ctx.restore();
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 16px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), 12, 24);

  // Level
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px "Courier New"';
  ctx.fillText('LEVEL ' + level, W / 2, 20);

  // Wave progress bar
  const barW = 160, barH = 8;
  const barX = W / 2 - barW / 2, barY = 26;
  const killed = waveEnemiesKilled;
  const total = waveEnemiesTotal;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#00cc66';
  ctx.fillRect(barX, barY, barW * (killed / total), barH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.font = '10px "Courier New"';
  ctx.fillStyle = '#888';
  ctx.fillText(killed + '/' + total, W / 2, barY + barH + 12);

  // HP bar
  const hpBarW = 150, hpBarH = 14;
  const hpBarX = W - hpBarW - 12;
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888';
  ctx.font = '11px "Courier New"';
  ctx.fillText('HP', hpBarX - 6, 22);
  ctx.fillStyle = '#333';
  ctx.fillRect(hpBarX, 10, hpBarW, hpBarH);
  const hpFrac = player.hp / player.maxHp;
  const hpColor = hpFrac > 0.5 ? '#44ff44' : hpFrac > 0.25 ? '#ffaa00' : '#ff3333';
  ctx.fillStyle = hpColor;
  ctx.fillRect(hpBarX, 10, hpBarW * hpFrac, hpBarH);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, 10, hpBarW, hpBarH);
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Courier New"';
  ctx.fillText(player.hp + '/' + player.maxHp, hpBarX + hpBarW - 4, 22);
}

function drawMenu() {
  // Background
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  // Starfield
  for (const s of stars) {
    ctx.globalAlpha = 0.4 + Math.sin(blinkTimer * 2 + s.alpha * 10) * 0.3;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);

  // Title glow
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 64px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('TOP-DOWN', W / 2, H / 2 - 60);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px "Courier New"';
  ctx.fillText('SHOOTER', W / 2, H / 2 - 10);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '14px "Courier New"';
  ctx.fillText('WASD / ARROWS TO MOVE  |  MOUSE TO AIM  |  CLICK TO SHOOT', W / 2, H / 2 + 35);

  // Blinking start
  if (Math.floor(blinkTimer * 2) % 2 === 0) {
    ctx.fillStyle = '#ffee00';
    ctx.font = 'bold 22px "Courier New"';
    ctx.shadowColor = '#ffee00';
    ctx.shadowBlur = 10;
    ctx.fillText('[ CLICK TO START ]', W / 2, H / 2 + 90);
    ctx.shadowBlur = 0;
  }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '14px "Courier New"';
    ctx.fillText('HIGH SCORE: ' + String(highScore).padStart(5, '0'), W / 2, H / 2 + 130);
  }

  // Version
  ctx.fillStyle = '#333';
  ctx.font = '11px "Courier New"';
  ctx.fillText('v1.0', W - 30, H - 10);
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0, 20, 10, 0.7)';
  ctx.fillRect(0, 0, W, H);

  const progress = 1 - (levelCompleteTimer / LEVEL_COMPLETE_DUR);
  const scale = 0.5 + progress * 0.5;

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 42px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + level + ' COMPLETE!', 0, -20);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffee00';
  ctx.font = '20px "Courier New"';
  ctx.fillText('SCORE: ' + score, 0, 20);
  ctx.restore();

  // Continue bar
  const barFrac = levelCompleteTimer / LEVEL_COMPLETE_DUR;
  ctx.fillStyle = '#00aa44';
  ctx.fillRect(W / 2 - 100, H / 2 + 60, 200 * (1 - barFrac), 6);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(W / 2 - 100, H / 2 + 60, 200, 6);
  ctx.fillStyle = '#666';
  ctx.font = '12px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT LEVEL IN...', W / 2, H / 2 + 84);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(80, 0, 0, 0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 72px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px "Courier New"';
  ctx.fillText('SCORE: ' + score, W / 2, H / 2 + 10);

  ctx.fillStyle = '#aaa';
  ctx.font = '16px "Courier New"';
  ctx.fillText('HIGH SCORE: ' + highScore, W / 2, H / 2 + 40);

  if (Math.floor(blinkTimer * 2) % 2 === 0) {
    ctx.fillStyle = '#ffee00';
    ctx.font = 'bold 20px "Courier New"';
    ctx.shadowColor = '#ffee00';
    ctx.shadowBlur = 10;
    ctx.fillText('[ CLICK TO RESTART ]', W / 2, H / 2 + 90);
    ctx.shadowBlur = 0;
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>
